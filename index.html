<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>할 일 관리</title><style> * { margin: 0; padding: 0; box-sizing: border-box; } :root { --urgent: #ef4444; --high: #f97316; --normal: #3b82f6; --low: #22c55e; --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --muted: #94a3b8; --border: #e2e8f0; } body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; } /* ── Header ── */ .header { background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%); color: white; padding: 24px 28px 20px; } .header-top { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; } .header h1 { font-size: 1.5rem; font-weight: 700; } .header .date { font-size: 0.85rem; opacity: 0.75; margin-top: 3px; } .stats-pills { display: flex; gap: 8px; flex-wrap: wrap; } .pill { background: rgba(255,255,255,0.15); border-radius: 20px; padding: 5px 12px; font-size: 0.8rem; font-weight: 600; display: flex; align-items: center; gap: 5px; } .pill span { font-size: 1rem; font-weight: 700; } .progress-label { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 7px; opacity: 0.85; } .progress-bar-bg { background: rgba(255,255,255,0.2); border-radius: 999px; height: 8px; overflow: hidden; } .progress-bar-fill { height: 100%; background: linear-gradient(90deg,#34d399,#10b981); border-radius: 999px; transition: width .5s ease; } /* ── How-to ── */ .howto { background: #fffbeb; border-bottom: 1px solid #fde68a; padding: 9px 28px; font-size: 0.82rem; color: #92400e; display: flex; align-items: center; gap: 6px; } /* ── Toolbar ── */ .toolbar { background: white; border-bottom: 1px solid var(--border); padding: 10px 28px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; } .date-nav { display: flex; align-items: center; gap: 6px; } .btn-nav { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; cursor: pointer; font-size: 0.85rem; color: var(--text); transition: background .15s; } .btn-nav:hover { background: #f1f5f9; } #currentDateLabel { font-weight: 700; font-size: 0.9rem; min-width: 130px; text-align: center; } .btn-today { background: #2563eb; color: white; border: none; border-radius: 6px; padding: 5px 12px; font-size: 0.82rem; font-weight: 600; cursor: pointer; } .sep { width: 1px; height: 24px; background: var(--border); } .btn-all { background: #7c3aed; color: white; border: none; border-radius: 6px; padding: 5px 14px; font-size: 0.82rem; font-weight: 600; cursor: pointer; } .btn-add-toggle { background: #2563eb; color: white; border: none; border-radius: 6px; padding: 5px 14px; font-size: 0.82rem; font-weight: 600; cursor: pointer; margin-left: auto; } /* ── Add Form ── */ .add-form-wrap { background: #f8fafc; border-bottom: 1px solid var(--border); padding: 14px 28px; display: none; } .add-form-wrap.open { display: block; } .form-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; } .fg { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 160px; } .fg label { font-size: 0.75rem; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .05em; } .fg input, .fg select { padding: 8px 10px; border: 1px solid var(--border); border-radius: 7px; font-size: 0.88rem; background: white; } .fg input:focus, .fg select:focus { outline: none; border-color: #2563eb; } .btn-submit { padding: 8px 20px; background: #2563eb; color: white; border: none; border-radius: 7px; font-weight: 600; cursor: pointer; align-self: flex-end; font-size: 0.88rem; } /* ── Board ── */ .board { display: grid; grid-template-columns: repeat(4,1fr); gap: 18px; padding: 20px 28px; } @media (max-width:1080px) { .board { grid-template-columns: repeat(2,1fr); } } @media (max-width:620px) { .board { grid-template-columns: 1fr; } } .column { background: white; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; } .col-head { padding: 12px 14px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); } .col-dot { width: 9px; height: 9px; border-radius: 50%; } .col-urgent .col-dot { background: var(--urgent); } .col-high .col-dot { background: var(--high); } .col-normal .col-dot { background: var(--normal); } .col-low .col-dot { background: var(--low); } .col-title { font-weight: 700; font-size: 0.88rem; flex: 1; } .col-cnt { border-radius: 10px; padding: 1px 8px; font-size: 0.76rem; font-weight: 700; } .col-urgent .col-cnt { background: #fef2f2; color: var(--urgent); } .col-high .col-cnt { background: #fff7ed; color: var(--high); } .col-normal .col-cnt { background: #eff6ff; color: var(--normal); } .col-low .col-cnt { background: #f0fdf4; color: var(--low); } .cards { padding: 10px; display: flex; flex-direction: column; gap: 7px; flex: 1; } .card { background: white; border: 1px solid var(--border); border-radius: 9px; padding: 11px 12px; display: flex; align-items: flex-start; gap: 8px; transition: box-shadow .15s, opacity .15s; } .card:hover { box-shadow: 0 3px 12px rgba(0,0,0,.08); } .card.done { opacity: .48; } .card.done .card-title { text-decoration: line-through; color: var(--muted); } .col-urgent .card { border-left: 3px solid var(--urgent); } .col-high .card { border-left: 3px solid var(--high); } .col-normal .card { border-left: 3px solid var(--normal); } .col-low .card { border-left: 3px solid var(--low); } .card-chk { width: 18px; height: 18px; border-radius: 4px; border: 2px solid var(--border); flex-shrink: 0; cursor: pointer; transition: all .15s; position: relative; margin-top: 2px; } .col-urgent .card-chk { border-color: var(--urgent); } .col-high .card-chk { border-color: var(--high); } .col-normal .card-chk { border-color: var(--normal); } .col-low .card-chk { border-color: var(--low); } .card.done .card-chk { background: #22c55e; border-color: #22c55e; } .card.done .card-chk::after { content: '✓'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.65rem; font-weight: 800; } .card-body { flex: 1; min-width: 0; } .card-title { font-size: 0.86rem; font-weight: 600; line-height: 1.4; } .card-note { font-size: 0.76rem; color: var(--muted); margin-top: 3px; } .card-meta { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; align-items: center; } .tag-pm-sm { font-size: 0.66rem; background: #fdf4ff; color: #9333ea; border-radius: 4px; padding: 1px 5px; font-weight: 700; } .btn-del { background: none; border: none; cursor: pointer; color: #cbd5e1; font-size: 0.85rem; padding: 2px 3px; border-radius: 4px; flex-shrink: 0; transition: color .15s, background .15s; } .btn-del:hover { color: var(--urgent); background: #fef2f2; } .empty { color: var(--muted); font-size: 0.8rem; text-align: center; padding: 18px 0 10px; } /* ── All-View Modal ── */ .overlay { position: fixed; inset: 0; background: rgba(15,23,42,.6); display: none; align-items: flex-start; justify-content: center; z-index: 900; padding: 32px 16px; overflow-y: auto; } .overlay.open { display: flex; } .modal { background: white; border-radius: 16px; width: 100%; max-width: 980px; box-shadow: 0 24px 60px rgba(0,0,0,.25); overflow: hidden; } .modal-header { background: linear-gradient(135deg, #1e3a5f, #7c3aed); color: white; padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; } .modal-header h2 { font-size: 1.1rem; } .btn-close { background: rgba(255,255,255,.2); border: none; color: white; border-radius: 8px; padding: 4px 10px; cursor: pointer; font-size: 1rem; } .modal-body { padding: 20px 24px; max-height: 75vh; overflow-y: auto; } /* Summary bar */ .all-summary { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; padding: 14px 16px; background: #f8fafc; border-radius: 10px; border: 1px solid var(--border); } .sum-item { display: flex; flex-direction: column; align-items: center; flex: 1; min-width: 80px; } .sum-num { font-size: 1.6rem; font-weight: 800; line-height: 1; } .sum-label { font-size: 0.72rem; color: var(--muted); margin-top: 3px; } .sum-urgent .sum-num { color: var(--urgent); } .sum-high .sum-num { color: var(--high); } .sum-normal .sum-num { color: var(--normal); } .sum-low .sum-num { color: var(--low); } .sum-done .sum-num { color: #22c55e; } .day-group { margin-bottom: 24px; } .day-group-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid #f1f5f9; flex-wrap: wrap; gap: 6px; } .day-group-title { font-size: 1rem; font-weight: 700; color: #1e293b; display: flex; align-items: center; gap: 6px; } .today-badge { font-size: 0.72rem; background: #2563eb; color: white; border-radius: 5px; padding: 1px 7px; } .day-group-meta { display: flex; gap: 8px; } .badge { border-radius: 12px; padding: 2px 8px; font-weight: 600; font-size: 0.77rem; } .badge-done { background: #dcfce7; color: #15803d; } .badge-remain { background: #fef3c7; color: #92400e; } .row-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 8px; } .mini-card { border-radius: 9px; padding: 10px 12px; border: 1px solid var(--border); display: flex; align-items: flex-start; gap: 8px; } .mini-card.done { opacity: .5; } .mini-card.done .mc-title { text-decoration: line-through; } .mc-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; } .mc-urgent { background: var(--urgent); } .mc-high { background: var(--high); } .mc-normal { background: var(--normal); } .mc-low { background: var(--low); } .mc-body { flex: 1; } .mc-title { font-size: 0.82rem; font-weight: 600; line-height: 1.4; } .mc-note { font-size: 0.72rem; color: var(--muted); margin-top: 2px; } .mc-tags { display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap; } .mc-tag { font-size: 0.65rem; border-radius: 4px; padding: 1px 5px; font-weight: 700; } .tag-urgent { background: #fef2f2; color: #ef4444; } .tag-high { background: #fff7ed; color: #f97316; } .tag-normal { background: #eff6ff; color: #3b82f6; } .tag-low { background: #f0fdf4; color: #22c55e; } .tag-pm { background: #fdf4ff; color: #9333ea; } .tag-done { background: #dcfce7; color: #15803d; } /* ── Monthly View Modal ── */ .mo-overlay { position: fixed; inset: 0; background: rgba(15,23,42,.65); display: none; align-items: flex-start; justify-content: center; z-index: 910; padding: 24px 16px; overflow-y: auto; } .mo-overlay.open { display: flex; } .mo-modal { background: white; border-radius: 18px; width: 100%; max-width: 1100px; box-shadow: 0 28px 70px rgba(0,0,0,.3); overflow: hidden; } .mo-header { background: linear-gradient(135deg, #0f172a, #0369a1); color: white; padding: 18px 24px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; } .mo-header h2 { font-size: 1.05rem; flex: 1; } .mo-nav { display: flex; align-items: center; gap: 8px; } .mo-nav button { background: rgba(255,255,255,.18); border: none; color: white; border-radius: 7px; padding: 4px 11px; cursor: pointer; font-size: 0.9rem; transition: background .15s; } .mo-nav button:hover { background: rgba(255,255,255,.32); } #moMonthLabel { font-size: 1rem; font-weight: 700; min-width: 100px; text-align: center; } .mo-close { background: rgba(255,255,255,.18); border: none; color: white; border-radius: 8px; padding: 4px 10px; cursor: pointer; font-size: 0.95rem; } .mo-body { display: flex; gap: 0; min-height: 520px; } /* Left: calendar */ .mo-cal { flex: 1; min-width: 0; padding: 18px 20px; } /* Monthly summary strip */ .mo-summary { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; } .mo-sum-pill { display: flex; align-items: center; gap: 5px; background: #f8fafc; border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px; font-size: 0.78rem; font-weight: 600; } .mo-sum-pill .dot { width: 8px; height: 8px; border-radius: 50%; } /* Progress bar for monthly completion */ .mo-pct-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; } .mo-pct-label { font-size: 0.78rem; color: var(--muted); white-space: nowrap; } .mo-pct-bar { flex: 1; height: 7px; background: #e2e8f0; border-radius: 999px; overflow: hidden; } .mo-pct-fill { height: 100%; background: linear-gradient(90deg, #34d399, #059669); border-radius: 999px; transition: width .5s; } .mo-pct-num { font-size: 0.8rem; font-weight: 700; color: #059669; white-space: nowrap; } /* Calendar grid */ .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; } .cal-dow { text-align: center; font-size: 0.72rem; font-weight: 700; color: var(--muted); padding: 4px 0 6px; text-transform: uppercase; letter-spacing: .04em; } .cal-dow:first-child { color: #ef4444; } .cal-dow:last-child { color: #3b82f6; } .cal-cell { border-radius: 9px; padding: 6px 5px 5px; cursor: pointer; min-height: 68px; border: 1.5px solid transparent; transition: border-color .15s, box-shadow .15s, background .15s; display: flex; flex-direction: column; gap: 3px; background: #f8fafc; position: relative; } .cal-cell:hover { border-color: #93c5fd; box-shadow: 0 2px 8px rgba(37,99,235,.1); background: #eff6ff; } .cal-cell.selected { border-color: #2563eb !important; box-shadow: 0 0 0 3px rgba(37,99,235,.15); background: #eff6ff; } .cal-cell.today { border-color: #f97316; background: #fff7ed; } .cal-cell.today .cal-dn { color: #ea580c; font-weight: 800; } .cal-cell.empty { background: transparent; cursor: default; border-color: transparent; } .cal-cell.empty:hover { background: transparent; border-color: transparent; box-shadow: none; } /* Sunday red, Saturday blue */ .cal-cell.sun .cal-dn { color: #ef4444; } .cal-cell.sat .cal-dn { color: #3b82f6; } .cal-dn { font-size: 0.8rem; font-weight: 600; text-align: right; padding-right: 2px; color: #475569; line-height: 1; } /* Dot row: priority dots */ .cal-dots { display: flex; gap: 2px; flex-wrap: wrap; padding: 0 1px; } .cdot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; } /* Completion mini-bar at bottom of cell */ .cal-bar-wrap { margin-top: auto; } .cal-bar-bg { height: 3px; background: #e2e8f0; border-radius: 999px; overflow: hidden; } .cal-bar-fill { height: 100%; border-radius: 999px; background: #22c55e; } /* Heat tint based on task count */ .cal-cell.heat1 { background: #fefce8; } .cal-cell.heat2 { background: #fef9c3; } .cal-cell.heat3 { background: #fef08a; } .cal-cell.heat3:hover { background: #fde047; } /* Right: day detail panel */ .mo-detail { width: 290px; flex-shrink: 0; border-left: 1px solid var(--border); background: #f8fafc; padding: 18px 16px; display: flex; flex-direction: column; gap: 10px; } .mo-detail-title { font-size: 0.88rem; font-weight: 700; color: #1e293b; padding-bottom: 8px; border-bottom: 1px solid var(--border); } .mo-detail-empty { color: var(--muted); font-size: 0.82rem; text-align: center; margin-top: 24px; } .mo-detail-scroll { overflow-y: auto; display: flex; flex-direction: column; gap: 6px; flex: 1; } .det-card { background: white; border: 1px solid var(--border); border-radius: 8px; padding: 9px 11px; display: flex; align-items: flex-start; gap: 7px; } .det-card.done { opacity: .5; } .det-card.done .det-title { text-decoration: line-through; } .det-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; } .det-body { flex: 1; min-width: 0; } .det-title { font-size: 0.82rem; font-weight: 600; line-height: 1.4; } .det-note { font-size: 0.72rem; color: var(--muted); margin-top: 2px; } .det-tags { display: flex; gap: 3px; margin-top: 4px; flex-wrap: wrap; } @media (max-width: 780px) { .mo-body { flex-direction: column; } .mo-detail { width: 100%; border-left: none; border-top: 1px solid var(--border); } } /* ── Toast ── */ .toast { position: fixed; bottom: 24px; right: 24px; background: #1e293b; color: white; padding: 9px 16px; border-radius: 9px; font-size: 0.83rem; font-weight: 500; opacity: 0; transform: translateY(8px); transition: all .3s; pointer-events: none; z-index: 9999; } .toast.show { opacity: 1; transform: translateY(0); } /* ── Password Gate ── */ @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-9px)} 75%{transform:translateX(9px)} } .pw-gate { position: fixed; inset: 0; background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 55%, #2563eb 100%); display: flex; align-items: center; justify-content: center; z-index: 99999; } .pw-box { background: white; border-radius: 20px; padding: 44px 38px 36px; width: 100%; max-width: 380px; box-shadow: 0 32px 80px rgba(0,0,0,.45); text-align: center; } .pw-icon { font-size: 3rem; margin-bottom: 12px; } .pw-title { font-size: 1.3rem; font-weight: 800; color: #1e293b; margin-bottom: 6px; } .pw-sub { font-size: 0.85rem; color: #64748b; margin-bottom: 28px; line-height: 1.55; } .pw-input-wrap { position: relative; margin-bottom: 14px; } .pw-input { width: 100%; padding: 13px 46px 13px 16px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 1rem; outline: none; transition: border-color .2s; background: #f8fafc; } .pw-input:focus { border-color: #2563eb; background: white; } .pw-input.error { border-color: #ef4444; animation: shake .35s; } .pw-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #94a3b8; font-size: 1rem; padding: 4px; line-height: 1; } .pw-btn { width: 100%; padding: 13px; background: linear-gradient(135deg, #1e3a5f, #2563eb); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: opacity .2s; margin-bottom: 0; } .pw-btn:hover { opacity: 0.88; } .pw-error { color: #ef4444; font-size: 0.82rem; margin-top: 10px; min-height: 18px; } </style></head><body><div class="pw-gate" id="pwGate"><div class="pw-box"><div class="pw-icon">🔐</div><div class="pw-title">할 일 관리</div><div class="pw-sub">이 페이지는 비밀번호로 보호되어 있습니다.<br>접근 권한이 있는 분만 입력하세요.</div><div class="pw-input-wrap"><input class="pw-input" type="password" id="pwInput" placeholder="비밀번호를 입력하세요" onkeydown="if(event.key==='Enter')checkPw()" /><button class="pw-toggle" id="pwEye" onclick="togglePwEye()" type="button">👁</button></div><button class="pw-btn" onclick="checkPw()">입력</button><div class="pw-error" id="pwError"></div></div></div><div class="header"><div class="header-top"><div><h1>할 일 관리</h1><div class="date" id="todayDate"></div></div><div class="stats-pills"><div class="pill">전체 <span id="statTotal">0</span></div><div class="pill">✅ 완료 <span id="statDone">0</span></div><div class="pill">🔥 긴급 <span id="statUrgent">0</span></div></div></div><div><div class="progress-label"><span>진행률</span><span id="progressPct">0%</span></div><div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div></div></div><div class="howto"> 💡 <strong>완료 표시 방법:</strong> 카드 왼쪽의 □ 체크박스를 클릭하면 완료 처리됩니다. 다시 클릭하면 취소됩니다. </div><div class="toolbar"><div class="date-nav"><button class="btn-nav" onclick="moveDate(-1)">◀</button><span id="currentDateLabel"></span><button class="btn-nav" onclick="moveDate(1)">▶</button></div><button class="btn-today" onclick="goToday()">오늘</button><div class="sep"></div><button class="btn-all" onclick="openAllView()">📅 전체 날짜 조회</button><button class="btn-all" style="background:#0369a1;" onclick="openMonthView()">📆 월별 조회</button><button class="btn-add-toggle" onclick="toggleForm()">＋ 할 일 추가</button></div><div class="add-form-wrap" id="addFormWrap"><div class="form-row"><div class="fg" style="flex:2;min-width:200px"><label>할 일 제목</label><input type="text" id="inputTitle" placeholder="예) 보고서 작성" /></div><div class="fg"><label>중요도</label><select id="inputPriority"><option value="urgent">🔥 긴급</option><option value="high">⚡ 높음</option><option value="normal" selected>📌 보통</option><option value="low">🍃 낮음</option></select></div><div class="fg"><label>PM 업무?</label><select id="inputIsPM"><option value="no">일반 업무</option><option value="yes">PM 업무 (자동 긴급)</option></select></div><div class="fg"><label>마감 시간</label><input type="time" id="inputTime" /></div></div><div class="form-row"><div class="fg" style="flex:3"><label>메모</label><input type="text" id="inputNote" placeholder="간단한 메모" /></div><button class="btn-submit" onclick="addTask()">추가</button></div></div><div class="board"><div class="column col-urgent"><div class="col-head"><div class="col-dot"></div><div class="col-title">🔥 긴급</div><div class="col-cnt" id="cnt-urgent">0</div></div><div class="cards" id="col-urgent"></div></div><div class="column col-high"><div class="col-head"><div class="col-dot"></div><div class="col-title">⚡ 높음</div><div class="col-cnt" id="cnt-high">0</div></div><div class="cards" id="col-high"></div></div><div class="column col-normal"><div class="col-head"><div class="col-dot"></div><div class="col-title">📌 보통</div><div class="col-cnt" id="cnt-normal">0</div></div><div class="cards" id="col-normal"></div></div><div class="column col-low"><div class="col-head"><div class="col-dot"></div><div class="col-title">🍃 낮음</div><div class="col-cnt" id="cnt-low">0</div></div><div class="cards" id="col-low"></div></div></div><div class="mo-overlay" id="moOverlay" onclick="closeMoOverlay(event)"><div class="mo-modal" onclick="event.stopPropagation()"><div class="mo-header"><h2>📆 월별 조회</h2><div class="mo-nav"><button onclick="moveMoMonth(-1)">◀</button><span id="moMonthLabel"></span><button onclick="moveMoMonth(1)">▶</button></div><button class="mo-close" onclick="document.getElementById('moOverlay').classList.remove('open')">✕ 닫기</button></div><div class="mo-body"><div class="mo-cal"><div class="mo-summary" id="moSummary"></div><div class="mo-pct-row"><span class="mo-pct-label">월 완료율</span><div class="mo-pct-bar"><div class="mo-pct-fill" id="moPctFill" style="width:0%"></div></div><span class="mo-pct-num" id="moPctNum">0%</span></div><div class="cal-grid" id="calGrid"></div></div><div class="mo-detail" id="moDetail"><div class="mo-detail-title" id="moDetailTitle">날짜를 선택하세요</div><div class="mo-detail-scroll" id="moDetailScroll"><div class="mo-detail-empty">달력에서 날짜를 클릭하면<br>해당 날의 할 일이 표시됩니다</div></div></div></div></div></div><div class="overlay" id="overlay" onclick="closeOverlay(event)"><div class="modal" onclick="event.stopPropagation()"><div class="modal-header"><h2>📅 전체 날짜 할 일 조회</h2><button class="btn-close" onclick="document.getElementById('overlay').classList.remove('open')">✕ 닫기</button></div><div class="modal-body" id="allViewBody"></div></div></div><div class="toast" id="toast"></div><script> // ── Password Gate ── const PW_CORRECT = 'todo2026'; // ← 여기서 비밀번호 변경 const PW_SESSION_KEY = 'todo_auth'; function checkPw() { const val = document.getElementById('pwInput').value; if (val === PW_CORRECT) { sessionStorage.setItem(PW_SESSION_KEY, '1'); document.getElementById('pwGate').style.display = 'none'; } else { const inp = document.getElementById('pwInput'); inp.classList.remove('error'); void inp.offsetWidth; inp.classList.add('error'); document.getElementById('pwError').textContent = '비밀번호가 올바르지 않습니다.'; inp.value = ''; } } function togglePwEye() { const inp = document.getElementById('pwInput'); const eye = document.getElementById('pwEye'); if (inp.type === 'password') { inp.type = 'text'; eye.textContent = '🙈'; } else { inp.type = 'password'; eye.textContent = '👁'; } } // 이미 인증된 세션이면 바로 통과 if (sessionStorage.getItem(PW_SESSION_KEY) === '1') { document.getElementById('pwGate').style.display = 'none'; } // ── App ── const STORAGE_KEY = 'todo_v3'; const _now = new Date(); const TODAY = `${_now.getFullYear()}-${String(_now.getMonth()+1).padStart(2,'0')}-${String(_now.getDate()).padStart(2,'0')}`; const DEFAULT_TASKS = [ { id:1, title:'제품진행현황 공지', note:'', priority:'urgent', isPM:true, time:'', done:false, date:'2026-06-08' }, { id:2, title:'PLM 로직 인력 DT 배치', note:'', priority:'urgent', isPM:true, time:'', done:false, date:'2026-06-08' }, { id:3, title:'VR51 과제 GDSOUT', note:'', priority:'urgent', isPM:true, time:'', done:false, date:'2026-06-08' }, { id:4, title:'NDA 관련 → TDC 계정 삭제', note:'atd.mddi.a.076 / atd.mddi.a.077 / atd.mddi.a.078', priority:'high', isPM:false, time:'', done:false, date:'2026-06-08' }, { id:5, title:'미스터 스시조 경비처리', note:'행정서무 문의 필요', priority:'normal', isPM:false, time:'', done:false, date:'2026-06-08' }, { id:6, title:'Peer 면접 질문 출력', note:'', priority:'normal', isPM:false, time:'', done:false, date:'2026-06-08' } ]; // DEFAULT_TASKS는 최초 실행(2026-06-08 당시) 데이터를 보존합니다. let allTasks = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null'); if (!allTasks) { allTasks = DEFAULT_TASKS; save(); } let viewDate = TODAY; // PM 선택 시 자동 긴급 document.getElementById('inputIsPM').addEventListener('change', function() { if (this.value === 'yes') document.getElementById('inputPriority').value = 'urgent'; }); document.getElementById('inputTitle').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); }); function toggleForm() { document.getElementById('addFormWrap').classList.toggle('open'); } function fmtDate(str) { const [y,m,d] = str.split('-'); const days = ['일','월','화','수','목','금','토']; const dt = new Date(+y, +m-1, +d); return `${y}.${m}.${d} (${days[dt.getDay()]})`; } function updateDateLabel() { const isToday = viewDate === TODAY; document.getElementById('currentDateLabel').textContent = isToday ? `${fmtDate(viewDate)} 오늘` : fmtDate(viewDate); document.getElementById('todayDate').textContent = fmtDate(viewDate); } function moveDate(delta) { const d = new Date(viewDate); d.setDate(d.getDate() + delta); viewDate = d.toISOString().slice(0,10); updateDateLabel(); render(); } function goToday() { viewDate = TODAY; updateDateLabel(); render(); } function addTask() { const title = document.getElementById('inputTitle').value.trim(); if (!title) { showToast('제목을 입력해 주세요'); return; } const isPM = document.getElementById('inputIsPM').value === 'yes'; const priority = isPM ? 'urgent' : document.getElementById('inputPriority').value; allTasks.push({ id: Date.now(), title, note: document.getElementById('inputNote').value.trim(), priority, isPM, time: document.getElementById('inputTime').value, done: false, date: viewDate }); save(); render(); showToast('추가되었습니다 ✅'); ['inputTitle','inputNote','inputTime'].forEach(id => document.getElementById(id).value = ''); document.getElementById('inputIsPM').value = 'no'; document.getElementById('inputPriority').value = 'normal'; } function toggleDone(id) { const t = allTasks.find(t => t.id === id); if (t) { t.done = !t.done; save(); render(); } } function deleteTask(id) { allTasks = allTasks.filter(t => t.id !== id); save(); render(); showToast('삭제되었습니다'); } function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(allTasks)); } function render() { const tasks = allTasks.filter(t => t.date === viewDate); ['urgent','high','normal','low'].forEach(p => { const col = document.getElementById('col-'+p); const list = tasks.filter(t => t.priority === p).sort((a,b) => a.done - b.done); document.getElementById('cnt-'+p).textContent = list.length; if (!list.length) { col.innerHTML = '<div class="empty">할 일 없음</div>'; return; } col.innerHTML = list.map(t => { const pmTag = t.isPM ? '<span class="tag-pm-sm">PM</span>' : ''; const meta = pmTag ? `<div class="card-meta">${pmTag}</div>` : ''; return `<div class="card${t.done?' done':''}"><div class="card-chk" onclick="toggleDone(${t.id})"></div><div class="card-body"><div class="card-title">${esc(t.title)}</div> ${t.note?`<div class="card-note">${esc(t.note)}</div>`:''} ${meta} </div><button class="btn-del" onclick="deleteTask(${t.id})" title="삭제">✕</button></div>`; }).join(''); }); const total = tasks.length, done = tasks.filter(t=>t.done).length; const urgent = tasks.filter(t=>t.priority==='urgent'&&!t.done).length; const pct = total ? Math.round(done/total*100) : 0; document.getElementById('statTotal').textContent = total; document.getElementById('statDone').textContent = done; document.getElementById('statUrgent').textContent = urgent; document.getElementById('progressPct').textContent = pct+'%'; document.getElementById('progressBar').style.width = pct+'%'; } function openAllView() { const body = document.getElementById('allViewBody'); const dateMap = {}; allTasks.forEach(t => { if (!dateMap[t.date]) dateMap[t.date]=[]; dateMap[t.date].push(t); }); const dates = Object.keys(dateMap).sort().reverse(); // 전체 요약 const totalAll = allTasks.length; const doneAll = allTasks.filter(t=>t.done).length; const urgAll = allTasks.filter(t=>t.priority==='urgent').length; const highAll = allTasks.filter(t=>t.priority==='high').length; const normAll = allTasks.filter(t=>t.priority==='normal').length; const lowAll = allTasks.filter(t=>t.priority==='low').length; const summaryHtml = `<div class="all-summary"><div class="sum-item"><div class="sum-num" style="color:#1e293b">${totalAll}</div><div class="sum-label">전체</div></div><div class="sum-item sum-done"><div class="sum-num">${doneAll}</div><div class="sum-label">완료</div></div><div class="sum-item sum-urgent"><div class="sum-num">${urgAll}</div><div class="sum-label">🔥 긴급</div></div><div class="sum-item sum-high"><div class="sum-num">${highAll}</div><div class="sum-label">⚡ 높음</div></div><div class="sum-item sum-normal"><div class="sum-num">${normAll}</div><div class="sum-label">📌 보통</div></div><div class="sum-item sum-low"><div class="sum-num">${lowAll}</div><div class="sum-label">🍃 낮음</div></div></div>`; const prioOrder = {urgent:0,high:1,normal:2,low:3}; const prioLabel = {urgent:'🔥 긴급',high:'⚡ 높음',normal:'📌 보통',low:'🍃 낮음'}; const daysHtml = !dates.length ? '<p style="color:#94a3b8;text-align:center;padding:24px">등록된 할 일이 없습니다</p>' : dates.map(date => { const tasks = dateMap[date].sort((a,b) => prioOrder[a.priority]-prioOrder[b.priority] || a.done-b.done); const done = tasks.filter(t=>t.done).length; const remain = tasks.length - done; const isToday = date === TODAY; return `<div class="day-group"><div class="day-group-header"><div class="day-group-title"> ${fmtDate(date)} ${isToday?'<span class="today-badge">오늘</span>':''} </div><div class="day-group-meta"><span class="badge badge-done">완료 ${done}</span><span class="badge badge-remain">미완료 ${remain}</span></div></div><div class="row-grid">${tasks.map(t=>` <div class="mini-card${t.done?' done':''}"><div class="mc-dot mc-${t.priority}"></div><div class="mc-body"><div class="mc-title">${esc(t.title)}</div> ${t.note?`<div class="mc-note">${esc(t.note)}</div>`:''} <div class="mc-tags"><span class="mc-tag tag-${t.priority}">${prioLabel[t.priority]}</span> ${t.isPM?'<span class="mc-tag tag-pm">PM</span>':''} ${t.done?'<span class="mc-tag tag-done">✓ 완료</span>':''} </div></div></div>`).join('')} </div></div>`; }).join(''); body.innerHTML = summaryHtml + daysHtml; document.getElementById('overlay').classList.add('open'); } function closeOverlay(e) { if (e.target.id === 'overlay') document.getElementById('overlay').classList.remove('open'); } // ── Monthly View ── let moYear, moMonth, moSelectedDate = null; function openMonthView() { const base = new Date(TODAY); moYear = base.getFullYear(); moMonth = base.getMonth(); // 0-based moSelectedDate = null; renderMonthView(); document.getElementById('moOverlay').classList.add('open'); } function closeMoOverlay(e) { if (e.target.id === 'moOverlay') document.getElementById('moOverlay').classList.remove('open'); } function moveMoMonth(delta) { moMonth += delta; if (moMonth < 0) { moMonth = 11; moYear--; } if (moMonth > 11) { moMonth = 0; moYear++; } moSelectedDate = null; renderMonthView(); } function renderMonthView() { const DAYS_KO = ['일','월','화','수','목','금','토']; const MONTH_KO = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월']; document.getElementById('moMonthLabel').textContent = `${moYear}년 ${MONTH_KO[moMonth]}`; // Tasks for this month const prefix = `${moYear}-${String(moMonth+1).padStart(2,'0')}`; const monthTasks = allTasks.filter(t => t.date.startsWith(prefix)); // Monthly summary strip const mDone = monthTasks.filter(t=>t.done).length; const mTotal = monthTasks.length; const mPct = mTotal ? Math.round(mDone/mTotal*100) : 0; const urgCnt = monthTasks.filter(t=>t.priority==='urgent').length; const highCnt = monthTasks.filter(t=>t.priority==='high').length; const normCnt = monthTasks.filter(t=>t.priority==='normal').length; const lowCnt = monthTasks.filter(t=>t.priority==='low').length; document.getElementById('moSummary').innerHTML = [ ['#ef4444','🔥 긴급',urgCnt],['#f97316','⚡ 높음',highCnt], ['#3b82f6','📌 보통',normCnt],['#22c55e','🍃 낮음',lowCnt], ['#22c55e','✅ 완료',mDone],['#1e293b','전체',mTotal] ].map(([color,label,cnt])=>` <div class="mo-sum-pill"><div class="dot" style="background:${color}"></div><span style="color:${color};font-weight:700">${cnt}</span><span style="color:#64748b">${label}</span></div>`).join(''); document.getElementById('moPctFill').style.width = mPct+'%'; document.getElementById('moPctNum').textContent = mPct+'%'; // Build calendar const firstDay = new Date(moYear, moMonth, 1).getDay(); // 0=Sun const daysInMonth = new Date(moYear, moMonth+1, 0).getDate(); // Day-of-week header let html = DAYS_KO.map(d=>`<div class="cal-dow">${d}</div>`).join(''); // Empty cells before 1st for (let i=0; i<firstDay; i++) html += `<div class="cal-cell empty"></div>`; for (let d=1; d<=daysInMonth; d++) { const dateStr = `${moYear}-${String(moMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; const dayTasks = allTasks.filter(t=>t.date===dateStr); const doneCount = dayTasks.filter(t=>t.done).length; const totalCount = dayTasks.length; const dow = (firstDay + d - 1) % 7; const isToday = dateStr === TODAY; const isSel = dateStr === moSelectedDate; const heatClass = totalCount >= 6 ? 'heat3' : totalCount >= 3 ? 'heat2' : totalCount >= 1 ? 'heat1' : ''; const dowClass = dow===0 ? 'sun' : dow===6 ? 'sat' : ''; // Priority dots (max 8) const prioColors = {urgent:'#ef4444',high:'#f97316',normal:'#3b82f6',low:'#22c55e'}; const dots = dayTasks.slice(0,8).map(t=>`<div class="cdot" style="background:${prioColors[t.priority] || '#94a3b8'}${t.done?';opacity:.35':''}"></div>`).join(''); // Completion mini-bar const barPct = totalCount ? Math.round(doneCount/totalCount*100) : 0; const barHtml = totalCount ? `<div class="cal-bar-wrap"><div class="cal-bar-bg"><div class="cal-bar-fill" style="width:${barPct}%"></div></div></div>` : ''; html += `<div class="cal-cell ${heatClass} ${dowClass}${isToday?' today':''}${isSel?' selected':''}" onclick="selectMoDay('${dateStr}')"><div class="cal-dn">${d}</div><div class="cal-dots">${dots}</div> ${barHtml} </div>`; } document.getElementById('calGrid').innerHTML = html; // Restore detail if a date was selected if (moSelectedDate) renderMoDetail(moSelectedDate); else { document.getElementById('moDetailTitle').textContent = '날짜를 선택하세요'; document.getElementById('moDetailScroll').innerHTML = '<div class="mo-detail-empty">달력에서 날짜를 클릭하면<br>해당 날의 할 일이 표시됩니다</div>'; } } function selectMoDay(dateStr) { moSelectedDate = dateStr; renderMonthView(); } function renderMoDetail(dateStr) { const [y,m,d] = dateStr.split('-'); const days = ['일','월','화','수','목','금','토']; const dt = new Date(+y,+m-1,+d); const isToday = dateStr === TODAY; document.getElementById('moDetailTitle').innerHTML = `${y}.${m}.${d} (${days[dt.getDay()]})${isToday?' <span style="font-size:.7rem;background:#2563eb;color:white;border-radius:4px;padding:1px 6px;margin-left:4px">오늘</span>':''}`; const tasks = allTasks.filter(t=>t.date===dateStr) .sort((a,b)=>({urgent:0,high:1,normal:2,low:3}[a.priority]-{urgent:0,high:1,normal:2,low:3}[b.priority])||a.done-b.done); const prioLabel = {urgent:'🔥 긴급',high:'⚡ 높음',normal:'📌 보통',low:'🍃 낮음'}; const prioColor = {urgent:'#ef4444',high:'#f97316',normal:'#3b82f6',low:'#22c55e'}; if (!tasks.length) { document.getElementById('moDetailScroll').innerHTML = '<div class="mo-detail-empty">이 날은 할 일이 없습니다</div>'; return; } document.getElementById('moDetailScroll').innerHTML = tasks.map(t=>` <div class="det-card${t.done?' done':''}"><div class="det-dot" style="background:${prioColor[t.priority]}"></div><div class="det-body"><div class="det-title">${esc(t.title)}</div> ${t.note?`<div class="det-note">${esc(t.note)}</div>`:''} <div class="det-tags"><span class="mc-tag tag-${t.priority}">${prioLabel[t.priority]}</span> ${t.isPM?'<span class="mc-tag tag-pm">PM</span>':''} ${t.done?'<span class="mc-tag tag-done">✓ 완료</span>':''} </div></div></div>`).join(''); } function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); } let toastTimer; function showToast(msg) { const el = document.getElementById('toast'); el.textContent = msg; el.classList.add('show'); clearTimeout(toastTimer); toastTimer = setTimeout(()=>el.classList.remove('show'), 2200); } updateDateLabel(); render(); </script></body></html>
